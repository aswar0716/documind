server {
    listen 3000;

    # Serve the React app's static files.
    root /usr/share/nginx/html;
    index index.html;

    # Any request to /api/* is forwarded (proxied) to the backend container.
    # "backend" is the service name defined in docker-compose.yml — Docker's
    # internal DNS resolves it to the backend container's IP automatically.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # All other requests serve index.html — this is required for React Router.
    # Without it, refreshing on a route like /compare would return a 404 because
    # Nginx looks for a file called "compare" which doesn't exist.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
