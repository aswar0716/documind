[pytest]
testpaths = tests
# Add the backend root to sys.path so 'from app.x import y' works in tests
pythonpath = .
# Disable ROS pytest plugins that bleed in from the system Python installation
addopts =
    -p no:ament_copyright
    -p no:ament_pep257
    -p no:ament_xmllint
    -p no:ament_flake8
    -p no:ament_lint
    -p no:launch_testing
    -p no:launch_ros
